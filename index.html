<script>
// ============================================================
// STATE
// ============================================================
let S = {};
let _th = [], _tr = []; // temp hotels/restaurants for logistics form

// ============================================================
// MULTI-USER AUTH
// ============================================================
const USERS = [
  {id:'admin', nome:'Administrador',    email:'admin@feeling.com',           pass:'feeling@2025', role:'admin'},
  {id:'user1', nome:'Rafael Alves',     email:'feelingproducoes@gmail.com',  pass:'Feeling0579',  role:'user'},
  {id:'user2', nome:'Jonathan Silveira',email:'jonathansilveirala@gmail.com',pass:'Feeling0579',  role:'user'}
];

// ============================================================
// SUPABASE CLOUD SYNC
// ============================================================
const SB_URL = 'https://rfwdouplffywijxshoax.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJmd2RvdXBsZmZ5d2lqeHNob2F4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxODU2OTEsImV4cCI6MjA4ODc2MTY5MX0.KaO9eAQiqNZ15mfP9z9hc2G7X7ja5dKd1ml0Z8b1WHg';
const SB_APP_ID = 'feeling_main';
let sbClient = null;

function initSupabase(){
  try{
    if(typeof supabase !== 'undefined' && supabase.createClient){
      sbClient = supabase.createClient(SB_URL, SB_KEY);
    }
  }catch(e){ console.warn('Supabase init failed:', e); }
}

async function loadFromCloud(){
  if(!sbClient) return null;
  try{
    const {data, error} = await sbClient.from('feeling_app_data')
      .select('payload').eq('app_id', SB_APP_ID).maybeSingle();
    if(error) throw error;
    return data ? data.payload : null;
  }catch(e){ console.warn('Cloud load failed:', e); return null; }
}

async function saveToCloud(){
  if(!sbClient) return;
  try{
    await sbClient.from('feeling_app_data')
      .upsert({app_id: SB_APP_ID, payload: S, updated_at: new Date().toISOString()},
              {onConflict: 'app_id'});
  }catch(e){ console.warn('Cloud save failed:', e); }
}

function getSession(){return JSON.parse(localStorage.getItem('ef_session')||'null');}
function setSession(u){localStorage.setItem('ef_session',JSON.stringify(u));}
function clearSession(){localStorage.removeItem('ef_session');}
function currentUser(){return getSession();}
function isAdmin(){const u=currentUser();return u&&u.role==='admin';}

// Returns events array for current user (admin sees all merged)
function myEvents(){
  const u=currentUser();
  if(!u) return [];
  if(u.role==='admin'){
    const all=[];
    ['user1','user2'].forEach(uid=>{
      (S.events[uid]||[]).forEach(e=>all.push({...e,_owner:uid}));
    });
    return all.sort((a,b)=>a.data.localeCompare(b.data));
  }
  return (S.events[u.id]||[]);
}

// Returns logistics array for current user
function myLogistics(){
  const u=currentUser();
  if(!u) return [];
  if(u.role==='admin'){
    const all=[];
    ['user1','user2'].forEach(uid=>{
      (S.logistics[uid]||[]).forEach(l=>all.push({...l,_owner:uid}));
    });
    return all;
  }
  return (S.logistics[u.id]||[]);
}

function ownerLabel(uid){
  const u=USERS.find(x=>x.id===uid);
  return u?u.nome:'?';
}

function togglePassVis(){
  const inp=document.getElementById('login-pass');
  const eye=document.getElementById('pass-eye');
  if(inp.type==='password'){inp.type='text';eye.className='fas fa-eye-slash text-sm';}
  else{inp.type='password';eye.className='fas fa-eye text-sm';}
}

function applyLoginLogo(){
  const img=document.getElementById('login-logo');
  if(!img) return;
  // Use saved company logo (from localStorage) or fallback to SAMPLE
  let logo=SAMPLE.company.logo;
  try{const s=localStorage.getItem('ef_v3');if(s){const d=JSON.parse(s);if(d.company&&d.company.logo)logo=d.company.logo;}}catch(e){}
  if(logo){img.src=logo;img.style.display='block';}
  else{img.style.display='none';}
}

function doLogin(){
  const email=document.getElementById('login-email').value.trim().toLowerCase();
  const pass=document.getElementById('login-pass').value;
  const errEl=document.getElementById('login-error');
  const u=USERS.find(x=>x.email===email&&x.pass===pass);
  if(!u){
    errEl.textContent='E-mail ou senha incorretos.';
    errEl.classList.remove('hidden');
    document.getElementById('login-pass').value='';
    return;
  }
  errEl.classList.add('hidden');
  setSession(u);
  document.getElementById('login-screen').style.display='none';
  updateSidebarUser();
  init();
}

function doLogout(){
  if(!confirm('Sair da conta?'))return;
  clearSession();
  location.reload();
}

function updateSidebarUser(){
  const u=currentUser();
  if(!u) return;
  const n=document.getElementById('sidebar-name');
  const a=document.getElementById('sidebar-avatar');
  const r=document.getElementById('sidebar-role');
  if(n) n.textContent=u.nome;
  if(a) a.textContent=u.nome.charAt(0);
  if(r) r.textContent=u.role==='admin'?'Administrador':'Produtor';
}

const SAMPLE = {
  company: {
    nome: 'Feeling Produções',
    cnpj: '00.000.000/0001-00',
    endereco: 'Belo Horizonte, MG',
    telefone: '(31) 99999-0000',
    email: 'contato@feelingproducoes.com.br',

// ============================================================
// INIT & SAVE
// ============================================================
async function init(){
  const u=currentUser();
  if(!u){document.getElementById('login-screen').style.display='flex';return;}

  // Tenta carregar da nuvem primeiro; fallback para localStorage
  let loaded = false;
  const cloudData = await loadFromCloud();
  if(cloudData){
    try{
      S = cloudData;
      migrateState();
      loaded = true;
    }catch(e){ console.warn('Cloud data parse error:', e); }
  }

  if(!loaded){
    const s = localStorage.getItem('ef_v3');
    if(s){
      try{ S=JSON.parse(s); migrateState(); }
      catch(e){ S=buildFreshSample(); }
    } else {
      S=buildFreshSample();
    }
  }

  save(); // persiste localmente e sobe para nuvem se precisar
  updateSidebarCompany();
  updateSidebarUser();
  navigate('dashboard');
}

function migrateState(){
  if(Array.isArray(S.events)){
    const legacy=S.events;
    S.events={user1:legacy,user2:[]};
  }
  if(!S.events) S.events={user1:[],user2:[]};
  if(!S.events.user1) S.events.user1=[];
  if(!S.events.user2) S.events.user2=[];
  if(Array.isArray(S.logistics)){
    const legacy=S.logistics;
    S.logistics={user1:legacy,user2:[]};
  }
  if(!S.logistics) S.logistics={user1:[],user2:[]};
  if(!S.logistics.user1) S.logistics.user1=[];
  if(!S.logistics.user2) S.logistics.user2=[];
}

function buildFreshSample(){
  const base={...SAMPLE};
  // Convert flat arrays to per-user objects
  base.events={user1:SAMPLE.events||[],user2:[]};
  base.logistics={user1:SAMPLE.logistics||[],user2:[]};
  return base;
}
function save(){
  localStorage.setItem('ef_v3',JSON.stringify(S));
  saveToCloud(); // async fire-and-forget
}
function resetData(){if(!confirm('Restaurar dados de exemplo?'))return;S=buildFreshSample();save();updateSidebarCompany();navigate('dashboard');toast('Dados restaurados');}

function updateSidebarCompany(){
  const n=document.getElementById('sidebar-name');
  const a=document.getElementById('sidebar-avatar');
  if(n)n.textContent=S.company.nome;
  if(a)a.textContent=S.company.nome.charAt(0);
}

const VIEW_FAB={events:{label:'<i class="fas fa-plus text-xs"></i> Evento',fn:'openEventForm()'},musicians:{label:'<i class="fas fa-plus text-xs"></i> Músico',fn:'openMusicianForm()'},'event-types':{label:'<i class="fas fa-plus text-xs"></i> Tipo',fn:'openEventTypeForm()'}};

function navigate(v){
  S.currentView=v;
  document.querySelectorAll('[data-view],[data-bnav]').forEach(el=>{
    el.classList.toggle('active',el.dataset.view===v||el.dataset.bnav===v);
    if(el.dataset.bnav){
      const active=el.dataset.bnav===v;
      el.style.color=active?S.company.cor:'#94a3b8';
    }
  });
  const mt=document.getElementById('mobile-title');
  if(mt)mt.textContent=VIEW_TITLES[v]||v;
  const fab=document.getElementById('mobile-fab');
  const fabBtn=document.getElementById('fab-btn');
  if(fab&&fabBtn){
    if(VIEW_FAB[v]){fab.classList.remove('hidden');fabBtn.innerHTML=VIEW_FAB[v].label;fabBtn.setAttribute('onclick',VIEW_FAB[v].fn);}
    else fab.classList.add('hidden');
  }
  destroyCharts();
  const renders={dashboard:renderDashboard,events:renderEvents,logistics:renderLogistics,musicians:renderMusicians,'event-types':renderEventTypes,reports:renderReports,settings:renderSettings};
  const el=document.getElementById('app-content');
  el.innerHTML=(renders[v]?renders[v]():'');
  el.querySelector('div')?.classList.add('view-anim');
  if(v==='dashboard')setTimeout(initDashCharts,80);
  if(v==='reports')setTimeout(initReportCharts,80);
}

function calc(e){
  const c=e.musicos.reduce((s,m)=>s+m.cache,0);
  const d=e.logistica+e.alimentacao+e.outras+c;
  const l=e.preco-d;
  return{caches:c,despesas:d,liquido:l,margem:e.preco>0?l/e.preco*100:0};
}
function calcLog(l){return l.combustivel+l.alimentacao_log+l.pedagio+l.estacionamento+l.aluguel_carro+l.taxa_veiculo;}
function R$(v){return new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v||0);}
function fd(d){if(!d)return'—';const[y,m,di]=d.split('-');return`${di}/${m}/${y}`;}
function badge(s){return`<span class="badge ${SC[s]||''}">${SL[s]||s}</span>`;}
function mc(m){return m>50?'text-green-600':m>30?'text-yellow-600':'text-red-500';}
function gMapsUrl(a,b){return`https://www.google.com/maps/dir/${encodeURIComponent(a)}/${encodeURIComponent(b)}`;}
function hexRGB(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}

let charts={};

function initDashCharts(){
  const ae=myEvents().filter(e=>e.status!=='cancelado');
  mkChart('barChart',{type:'bar',data:{labels:ae.map(e=>e.nome.length>18?e.nome.slice(0,18)+'…':e.nome),datasets:[
    {label:'Contrato',data:ae.map(e=>e.preco),backgroundColor:'#7c3aed',borderRadius:5},
    {label:'Despesas',data:ae.map(e=>calc(e).despesas),backgroundColor:'#f87171',borderRadius:5},
    {label:'Líquido',data:ae.map(e=>calc(e).liquido),backgroundColor:'#34d399',borderRadius:5},
  ]},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{boxWidth:10,font:{size:11}}}},scales:{y:{ticks:{callback:v=>'R$'+(v/1000).toFixed(0)+'k'}}}}});
  const tL=myEvents().reduce((s,e)=>s+e.logistica,0),tA=myEvents().reduce((s,e)=>s+e.alimentacao,0),tC=myEvents().reduce((s,e)=>s+calc(e).caches,0),tO=myEvents().reduce((s,e)=>s+e.outras,0);
  mkChart('pieChart',{type:'doughnut',data:{labels:['Logística','Alimentação','Cachês','Outras'],datasets:[{data:[tL,tA,tC,tO],backgroundColor:['#7c3aed','#f59e0b','#ef4444','#6b7280'],borderWidth:0}]},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{boxWidth:10,font:{size:11}}}}}});

function initReportCharts(){
  const by={};myEvents().forEach(e=>{const t=S.eventTypes.find(x=>x.id===e.tipo_id);const k=t?.nome||'Outros';by[k]=(by[k]||0)+e.preco;});
  mkChart('typeChart',{type:'bar',data:{labels:Object.keys(by),datasets:[{data:Object.values(by),backgroundColor:['#7c3aed','#0891b2','#db2777','#059669','#d97706','#6b7280'],borderRadius:6}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>'R$'+(v/1000).toFixed(0)+'k'}}}}});
  const sr=[...myEvents()].sort((a,b)=>calc(b).margem-calc(a).margem);
  mkChart('marginChart',{type:'bar',data:{labels:sr.map(e=>e.nome.length>16?e.nome.slice(0,16)+'…':e.nome),datasets:[{data:sr.map(e=>+calc(e).margem.toFixed(1)),backgroundColor:sr.map(e=>calc(e).margem>50?'#34d399':calc(e).margem>30?'#fbbf24':'#f87171'),borderRadius:6}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{max:100,ticks:{callback:v=>v+'%'}}}}});
}

function toggleCC(mid){const cb=document.getElementById(`mc-${mid}`);const inp=document.getElementById(`cc-${mid}`);inp.disabled=!cb.checked;inp.classList.toggle('opacity-40',!cb.checked);}
function saveEvent(id){
  const nome=document.getElementById('ev-nome').value.trim();if(!nome){alert('Nome obrigatório.');return;}
  const musicos=[];document.querySelectorAll('.mus-cb:checked').forEach(cb=>{const mid=parseInt(cb.dataset.id);musicos.push({mid,cache:parseFloat(document.getElementById(`cc-${mid}`).value)||0});});
  const u=currentUser();
  const uid=(u&&u.role!=='admin')?u.id:'user1';
  const d={nome,tipo_id:parseInt(document.getElementById('ev-tipo').value)||null,data:document.getElementById('ev-data').value,horario:document.getElementById('ev-horario').value,local:document.getElementById('ev-local').value.trim(),cliente:document.getElementById('ev-cliente').value.trim(),status:document.getElementById('ev-status').value,preco:parseFloat(document.getElementById('ev-preco').value)||0,logistica:parseFloat(document.getElementById('ev-log').value)||0,alimentacao:parseFloat(document.getElementById('ev-alim').value)||0,outras:parseFloat(document.getElementById('ev-outras').value)||0,musicos};
  const userEvents=S.events[uid]||[];
  let prevStatus=null;
  if(id){
    const i=userEvents.findIndex(e=>e.id===id);
    if(i>=0){prevStatus=userEvents[i].status;userEvents[i]={...userEvents[i],...d};}
  } else {
    d.id=Date.now();
    userEvents.push(d);
  }
  S.events[uid]=userEvents;
  save();closeModal();navigate('events');toast('Evento salvo!');
  // Auto-dispatch OD when status becomes 'confirmado'
  if(d.status==='confirmado'&&prevStatus!=='confirmado'){
    const eid=id||d.id;
    setTimeout(()=>autoDispatchOD(eid),300);
  }
}
function delEvent(id){
  if(!confirm('Excluir evento?'))return;
  const u=currentUser();
  if(u&&u.role==='admin'){
    ['user1','user2'].forEach(uid=>{S.events[uid]=(S.events[uid]||[]).filter(e=>e.id!==id);});
  } else if(u){
    S.events[u.id]=(S.events[u.id]||[]).filter(e=>e.id!==id);
  }
  save();navigate('events');toast('Evento removido.');
}

function showAddPlace(t){document.getElementById(`add-${t==='hotel'?'hotel':'rest'}-form`).classList.remove('hidden');}
function cancelAddPlace(t){document.getElementById(`add-${t==='hotel'?'hotel':'rest'}-form`).classList.add('hidden');}
function confirmAddPlace(t){
  const p=t==='hotel'?'ph':'pr';
  const nome=document.getElementById(`${p}-nome`).value.trim();
  if(!nome){alert('Nome obrigatório.');return;}
  const obj={nome,tipo:document.getElementById(`${p}-tipo`).value,end:document.getElementById(`${p}-end`).value.trim(),tel:document.getElementById(`${p}-tel`).value.trim(),dist:document.getElementById(`${p}-dist`).value.trim(),plat:document.getElementById(`${p}-plat`).value,link:document.getElementById(`${p}-link`).value.trim()};
  if(t==='hotel')_th.push(obj);else _tr.push(obj);
  ['nome','end','tel','dist','link'].forEach(f=>document.getElementById(`${p}-${f}`).value='');

}
function saveLogistics(eid,lid){
  const d={event_id:eid,saida:document.getElementById('l-saida').value.trim(),chegada:document.getElementById('l-chegada').value.trim(),encontro:document.getElementById('l-encontro').value.trim(),hr_encontro:document.getElementById('l-hr-enc').value,hr_saida:document.getElementById('l-hr-sai').value,hr_chegada:document.getElementById('l-hr-che').value,uniforme:document.getElementById('l-uni').value.trim(),combustivel:parseFloat(document.getElementById('l-comb').value)||0,alimentacao_log:parseFloat(document.getElementById('l-alim').value)||0,pedagio:parseFloat(document.getElementById('l-ped').value)||0,estacionamento:parseFloat(document.getElementById('l-est').value)||0,aluguel_carro:parseFloat(document.getElementById('l-car').value)||0,taxa_veiculo:parseFloat(document.getElementById('l-taxa').value)||0,obs:document.getElementById('l-obs').value.trim(),hoteis:_th,restaurantes:_tr};
  const _u2=currentUser();const _uid=((_u2&&_u2.role!=='admin')?_u2.id:'user1');
  if(lid){
    const arr=S.logistics[_uid]||[];
    const i=arr.findIndex(l=>l.id===lid);
    if(i>=0){arr[i]={...arr[i],...d};S.logistics[_uid]=arr;}
    else{d.id=lid;arr.push(d);S.logistics[_uid]=arr;}
  } else {
    d.id=Date.now();
    S.logistics[_uid]=(S.logistics[_uid]||[]);
    S.logistics[_uid].push(d);
  }
  save();closeModal();navigate('logistics');toast('Logística salva!');
}

function addLetterhead(doc,title){
  const [r,g,b]=hexRGB(S.company.cor);
  doc.setFillColor(r,g,b);doc.rect(0,0,210,38,'F');
  if(S.company.logo){try{doc.addImage(S.company.logo,'PNG',10,6,28,26);}catch(e){}}
  doc.setTextColor(255,255,255);
  doc.setFontSize(14);doc.setFont('helvetica','bold');
  doc.text(S.company.nome,S.company.logo?42:15,16);
  doc.setFontSize(7);doc.setFont('helvetica','normal');
  doc.text(`CNPJ: ${S.company.cnpj}  |  ${S.company.telefone}  |  ${S.company.email}`,S.company.logo?42:15,23);
  doc.text(S.company.endereco,S.company.logo?42:15,29);
  doc.setFillColor(r,g,b);
  doc.setTextColor(0,0,0);
  doc.setFontSize(13);doc.setFont('helvetica','bold');
  const titleY=48;
  doc.text(title,105,titleY,{align:'center'});
  doc.setDrawColor(r,g,b);doc.setLineWidth(.5);doc.line(15,titleY+3,195,titleY+3);
  return titleY+10;
}
function addFooter(doc){
  const [r,g,b]=hexRGB(S.company.cor);
  doc.setFillColor(r,g,b);doc.rect(0,285,210,12,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(7);doc.setFont('helvetica','normal');
  doc.text(`${S.company.nome}  ·  ${S.company.site}  ·  Documento gerado em ${new Date().toLocaleDateString('pt-BR')}`,105,292,{align:'center'});
}
function addSection(doc,title,y,cor){
  const [r,g,b]=hexRGB(cor||S.company.cor);
  doc.setFillColor(r,g,b,0.1);doc.setFillColor(245,243,255);
  doc.roundedRect(15,y-4,180,8,2,2,'F');
  doc.setFontSize(9);doc.setFont('helvetica','bold');doc.setTextColor(r,g,b);
  doc.text(title,19,y+0.5);
  doc.setTextColor(0,0,0);
  return y+8;
}
function addRow(doc,key,val,y,bold=false){
  doc.setFontSize(9);doc.setFont('helvetica',bold?'bold':'normal');doc.setTextColor(80,80,80);
  doc.text(key+':',19,y);
  doc.setTextColor(20,20,20);doc.text(String(val||'—'),75,y);
  return y+7;
}

function generateODPDF(eid){
  const {jsPDF}=window.jspdf;const doc=new jsPDF();
  const e=myEvents().find(x=>x.id===eid);
  const log=myLogistics().find(l=>l.event_id===eid);
  const tipo=S.eventTypes.find(t=>t.id===e.tipo_id);
  let y=addLetterhead(doc,'ORDEM DO DIA');

  y=addSection(doc,'DADOS DO EVENTO',y);
  y=addRow(doc,'Evento',e.nome,y,true);
  y=addRow(doc,'Tipo',tipo?.nome,y);
  y=addRow(doc,'Data / Horário',`${fd(e.data)} às ${e.horario||'—'}h`,y);
  y=addRow(doc,'Local',e.local,y);
  y=addRow(doc,'Contratante',e.cliente,y);
  y=addRow(doc,'Status',SL[e.status]||e.status,y);
  y+=3;

  y=addSection(doc,'EQUIPE ESCALADA',y);
  e.musicos.forEach(m=>{const mu=S.musicians.find(x=>x.id===m.mid);if(mu){doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(40,40,40);doc.text(`• ${mu.nome} — ${mu.instr}`,22,y);doc.text(R$(m.cache),170,y,{align:'right'});y+=6;}});
  y+=3;

  if(log){
    y=addSection(doc,'UNIFORME',y);
    doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(40,40,40);
    doc.text(log.uniforme||'A definir',19,y);y+=10;

    y=addSection(doc,'LOGÍSTICA — PERCURSO',y);
    y=addRow(doc,'Ponto de Encontro',`${log.encontro} — ${log.hr_encontro}h`,y);
    y=addRow(doc,'Saída',`${log.saida} — ${log.hr_saida}h`,y);
    y=addRow(doc,'Chegada',`${log.chegada} — ${log.hr_chegada}h`,y);
    const mapUrl=gMapsUrl(log.saida,log.chegada);
    doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(60,60,200);
    doc.textWithLink('🗺  Ver rota no Google Maps',19,y,{url:mapUrl});y+=8;

    y=addSection(doc,'LOGÍSTICA — DESPESAS PREVISTAS',y);
    const costs=[['Combustível',log.combustivel],['Alimentação em trânsito',log.alimentacao_log],['Pedágio',log.pedagio],['Estacionamento',log.estacionamento],['Aluguel de Carro',log.aluguel_carro],['Taxa Uso de Veículo',log.taxa_veiculo]];
    costs.forEach(([k,v])=>{if(v>0){doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(40,40,40);doc.text(`• ${k}:`,22,y);doc.text(R$(v),170,y,{align:'right'});y+=6;}});
    const [cr,cg,cb]=hexRGB(S.company.cor);
    doc.setFillColor(cr,cg,cb,0.08);doc.setFillColor(240,240,255);
    doc.roundedRect(15,y,180,9,2,2,'F');
    doc.setFontSize(9);doc.setFont('helvetica','bold');doc.setTextColor(cr,cg,cb);
    doc.text('TOTAL PREVISTO:',19,y+6);doc.text(R$(calcLog(log)),170,y+6,{align:'right'});
    y+=14;

    if(log.hoteis.length>0){
      y=addSection(doc,'HOSPEDAGENS PRÓXIMAS',y);
      log.hoteis.forEach(h=>{doc.setFontSize(9);doc.setFont('helvetica','bold');doc.setTextColor(40,40,40);doc.text(`🏨 ${h.nome}`,19,y);y+=5;doc.setFont('helvetica','normal');doc.setTextColor(80,80,80);doc.text(`📍 ${h.end}${h.dist?' ('+h.dist+')':''}`,22,y);y+=5;if(h.tel){doc.text(`📞 ${h.tel}`,22,y);y+=5;}if(h.link){doc.setTextColor(60,60,200);doc.textWithLink(`🔗 ${PLAT_LABEL[h.plat]||h.plat}`,22,y,{url:h.link});y+=5;}y+=2;});
    }

    if(log.obs){y+=2;y=addSection(doc,'OBSERVAÇÕES',y);doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(40,40,40);const lines=doc.splitTextToSize(log.obs,170);doc.text(lines,19,y);y+=lines.length*6;}
  }

  addFooter(doc);
  doc.save(`OD_${e.nome.replace(/\s+/g,'_').replace(/[^a-zA-Z0-9_]/g,'')}.pdf`);
  toast('PDF gerado com sucesso!');
}

    <div class="flex items-center justify-between p-4 border-b border-slate-100">
      <h3 class="font-semibold text-slate-700 text-sm">Detalhamento Financeiro Completo</h3>
    </div>
    <div class="scroll-x">
    <table class="w-full text-sm min-w-[700px]">
      <thead class="bg-slate-50"><tr class="text-left text-slate-400 text-xs">
        <th class="px-4 py-3 font-semibold">Evento</th><th class="px-3 py-3 font-semibold">Data</th>
        <th class="px-3 py-3 font-semibold text-right">Contrato</th><th class="px-3 py-3 font-semibold text-right">Log.</th>
        <th class="px-3 py-3 font-semibold text-right">Alim.</th><th class="px-3 py-3 font-semibold text-right">Cachês</th>
        <th class="px-3 py-3 font-semibold text-right">Outras</th><th class="px-3 py-3 font-semibold text-right">Líquido</th>
        <th class="px-3 py-3 font-semibold text-right">Margem</th><th class="px-3 py-3 font-semibold">Status</th>
      </tr></thead>
      <tbody>${sorted.map(e=>{const f=calc(e);return`<tr class="border-t border-slate-50 hover:bg-slate-50">
        <td class="px-4 py-3 font-semibold text-slate-700 max-w-[160px] truncate" title="${e.nome}">${e.nome}</td>
        <td class="px-3 py-3 text-slate-400 whitespace-nowrap">${fd(e.data)}</td>
        <td class="px-3 py-3 text-right font-semibold">${R$(e.preco)}</td>
        <td class="px-3 py-3 text-right text-red-400">${R$(e.logistica)}</td>
        <td class="px-3 py-3 text-right text-red-400">${R$(e.alimentacao)}</td>
        <td class="px-3 py-3 text-right text-red-400">${R$(f.caches)}</td>
        <td class="px-3 py-3 text-right text-red-400">${R$(e.outras)}</td>
        <td class="px-3 py-3 text-right font-bold text-green-600">${R$(f.liquido)}</td>
        <td class="px-3 py-3 text-right font-bold ${mc(f.margem)}">${f.margem.toFixed(1)}%</td>
        <td class="px-3 py-3">${badge(e.status)}</td>
      </tr>`;}).join('')}</tbody>
      <tfoot class="border-t-2 border-slate-200" style="background:#f5f3ff"><tr class="font-bold text-sm">
        <td class="px-4 py-3 text-purple-800" colspan="2">TOTAL GERAL</td>
        <td class="px-3 py-3 text-right text-purple-800">${R$(tC)}</td>
        <td class="px-3 py-3 text-right text-red-600">${R$(myEvents().reduce((s,e)=>s+e.logistica,0))}</td>
        <td class="px-3 py-3 text-right text-red-600">${R$(myEvents().reduce((s,e)=>s+e.alimentacao,0))}</td>
        <td class="px-3 py-3 text-right text-red-600">${R$(myEvents().reduce((s,e)=>s+calc(e).caches,0))}</td>
        <td class="px-3 py-3 text-right text-red-600">${R$(myEvents().reduce((s,e)=>s+e.outras,0))}</td>
        <td class="px-3 py-3 text-right text-green-700">${R$(tL)}</td>
        <td class="px-3 py-3 text-right ${mc(tC>0?tL/tC*100:0)} ">${tC>0?(tL/tC*100).toFixed(1):0}%</td>
        <td></td>
      </tr></tfoot>
    </table></div>
  </div></div>`;
}
function exportCSV(){
  const h=['Evento','Data','Cliente','Tipo','Status','Contrato','Logística','Alimentação','Cachês','Outras','Total Despesas','Valor Líquido','Margem %'];
  const rows=myEvents().map(e=>{const f=calc(e);const t=S.eventTypes.find(x=>x.id===e.tipo_id);return[`"${e.nome}"`,fd(e.data),`"${e.cliente}"`,t?.nome||'',SL[e.status],e.preco,e.logistica,e.alimentacao,f.caches,e.outras,f.despesas,f.liquido,f.margem.toFixed(1)];});
  const csv=[h,...rows].map(r=>r.join(';')).join('\n');
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='eventflow_relatorio.csv';a.click();URL.revokeObjectURL(url);
  toast('CSV exportado!');
}

function renderSettings(){
  const c=S.company;
  return`<div>
  <div class="hidden lg:block mb-5">
    <h1 class="text-2xl font-bold text-slate-800">Configurações</h1>
    <p class="text-slate-400 text-sm">Dados da empresa para documentos e timbrado</p>
  </div>
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
    <div class="card p-5">
      <h3 class="font-bold text-slate-700 mb-4 flex items-center gap-2"><i class="fas fa-building" style="color:${c.cor}"></i> Dados da Empresa</h3>
      <div class="space-y-3">
        <div><label class="lbl">Nome da Empresa</label><input id="s-nome" class="inp" value="${c.nome}"></div>
        <div><label class="lbl">CNPJ</label><input id="s-cnpj" class="inp" value="${c.cnpj}" inputmode="numeric"></div>
        <div><label class="lbl">Endereço Completo</label><textarea id="s-end" rows="2" class="inp resize-none">${c.endereco}</textarea></div>
        <div class="grid grid-cols-2 gap-3">
          <div><label class="lbl">Telefone</label><input id="s-tel" class="inp" inputmode="tel" value="${c.telefone}"></div>
          <div><label class="lbl">E-mail</label><input id="s-email" class="inp" type="email" inputmode="email" value="${c.email}"></div>
        </div>
        <div><label class="lbl">Website</label><input id="s-site" class="inp" value="${c.site}"></div>
        <div><label class="lbl">Cor Principal (timbrado)</label><input type="color" id="s-cor" class="inp h-12 p-1" value="${c.cor}"></div>
      </div>
    </div>
    <div class="card p-5">
      <h3 class="font-bold text-slate-700 mb-4 flex items-center gap-2"><i class="fas fa-image text-purple-500"></i> Logo da Empresa</h3>
      <div class="border-2 border-dashed border-slate-200 rounded-xl p-6 text-center mb-4">
        ${c.logo?`<img src="${c.logo}" class="max-h-24 max-w-full mx-auto mb-2 rounded-lg object-contain">`:'<i class="fas fa-cloud-upload-alt text-4xl text-slate-300 mb-2 block"></i>'}
        <p class="text-sm text-slate-400 mb-3">${c.logo?'Logo carregada':'PNG, JPG ou SVG — máx. 2MB'}</p>
        <input type="file" id="logo-input" accept="image/*" class="hidden" onchange="handleLogo(event)">
        <div class="flex gap-2 justify-center">
          <button onclick="document.getElementById('logo-input').click()" class="btn bg2 text-sm min-h-[40px]"><i class="fas fa-upload mr-1"></i>Carregar Logo</button>
          ${c.logo?`<button onclick="S.company.logo=null;save();navigate('settings');toast('Logo removida.')" class="btn bd text-sm min-h-[40px]"><i class="fas fa-trash mr-1"></i>Remover</button>`:''}
        </div>
      </div>
      <div class="bg-slate-50 rounded-xl p-4">
        <div class="text-xs font-bold text-slate-600 mb-2 uppercase tracking-wide">Preview do Timbrado</div>
        <div class="rounded-lg p-3 text-white text-xs" style="background:${c.cor}">
          <div class="font-bold text-sm">${c.nome}</div>
          <div class="opacity-80 mt-0.5">CNPJ: ${c.cnpj}  ·  ${c.telefone}</div>

      </div>

function handleLogo(e){
  const f=e.target.files[0];if(!f)return;
  if(f.size>2*1024*1024){alert('Arquivo muito grande. Máximo 2MB.');return;}
  const r=new FileReader();r.onload=ev=>{S.company.logo=ev.target.result;save();navigate('settings');toast('Logo carregada!');};r.readAsDataURL(f);
}
function saveSettings(){
  S.company.nome=document.getElementById('s-nome').value.trim()||S.company.nome;
  S.company.cnpj=document.getElementById('s-cnpj').value.trim();
  S.company.endereco=document.getElementById('s-end').value.trim();
  S.company.telefone=document.getElementById('s-tel').value.trim();
  S.company.email=document.getElementById('s-email').value.trim();
  S.company.site=document.getElementById('s-site').value.trim();
  S.company.cor=document.getElementById('s-cor').value;
  save();updateSidebarCompany();updateSidebarUser();navigate('settings');toast('Configurações salvas!');
}

function showModal(title,body,buttons){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').innerHTML=body;
  document.getElementById('modal-footer').innerHTML=buttons.map(([l,fn,cls])=>`<button onclick="${fn}" class="btn ${cls} flex-1">${l}</button>`).join('');
  document.getElementById('modal-overlay').classList.remove('hidden');
  setTimeout(()=>document.querySelector('#modal-body input,#modal-body textarea')?.focus(),100);
}
function closeModal(){document.getElementById('modal-overlay').classList.add('hidden');}
document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target.id==='modal-overlay')closeModal();});
